name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Compile the sketch ──────────────────────────────────────────────
  compile:
    name: Compile (FireBeetle 2 ESP32-E)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Show arduino-cli version
        run: arduino-cli version

      - name: Add ESP32 board URL
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
            "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"

      - name: Update board index
        run: arduino-cli core update-index

      - name: Install ESP32 board support (pinned 3.3.10)
        run: arduino-cli core install esp32:esp32@3.3.10

      - name: Install ArduinoJson v6
        run: arduino-cli lib install "ArduinoJson@6.21.5"

      - name: Verify board FQBN
        run: arduino-cli board details --fqbn "esp32:esp32:dfrobot_firebeetle2_esp32e"

      - name: Compile sketch
        run: |
          mkdir -p build
          arduino-cli compile \
            --verbose \
            --fqbn "esp32:esp32:dfrobot_firebeetle2_esp32e:PSRAM=disabled,PartitionScheme=default,CPUFreq=240,FlashMode=qio,FlashFreq=80,FlashSize=4M,UploadSpeed=921600" \
            --build-path build \
            e-paper-esp32-frame.ino 2>&1 | tee compile_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload compile log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compile-log
          path: compile_log.txt

      - name: Upload compiled firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32e
          path: |
            build/e-paper-esp32-frame.ino.elf
            build/e-paper-esp32-frame.ino.bin

  # ── Job 2: Wokwi simulation (album-switch scenario) ───────────────────────
  # Requires WOKWI_CLI_TOKEN secret (free at https://wokwi.com/dashboard/ci).
  # Without it, this job is skipped — compilation still passes.
  simulate:
    name: Wokwi simulation
    runs-on: ubuntu-latest
    needs: compile
    if: ${{ vars.WOKWI_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download compiled firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-esp32e
          path: build

      - name: Run album-switch scenario
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          timeout: 30000
